<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI实时目标检测 - 作业项目</title>
    <!-- 引入AI模型库（TensorFlow.js 前沿浏览器端AI框架） -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
    <!-- 引入样式 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 作业要求：显示学号 + 姓名 -->
        <div class="info-card">
            <h1>AI目标检测作业</h1>
            <h2>学号：202335020615</h2>
            <h2>姓名：黄寿昱</h2>
        </div>

        <!-- AI核心区域：摄像头 + 检测画面 -->
        <div class="ai-container">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
        </div>

        <!-- 可调参数面板（作业要求：调参功能） -->
        <div class="params-panel">
            <h3>🔧 AI参数调整</h3>
            <div class="param-item">
                <label>置信度阈值：</label>
                <input type="range" id="confidence" min="0.1" max="0.9" step="0.1" value="0.5">
                <span id="confidence-value">0.5</span>
            </div>
            <div class="param-item">
                <label>最大检测数量：</label>
                <input type="range" id="maxBoxes" min="1" max="20" step="1" value="5">
                <span id="maxBoxes-value">5</span>
            </div>
            <button id="startBtn">启动AI检测</button>
            <button id="stopBtn">停止检测</button>
        </div>

        <!-- 项目说明：可迁移、可优化 -->
        <div class="docs">
            <h3>📌 项目特性</h3>
            <p>✅ 可迁移：纯前端HTML/JS/CSS，任意平台/GitHub仓库可直接迁移</p>
            <p>✅ 可优化：优化模型加载速度、UI界面、检测帧率、代码结构</p>
            <p>✅ 可调参：置信度、检测数量、模型类型实时调整</p>
            <p>✅ 前沿技术：浏览器端AI边缘计算，TensorFlow.js轻量目标检测</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
